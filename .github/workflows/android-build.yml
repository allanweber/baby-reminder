name: Android build

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # NOTE: this produces an installable APK signed with the Flutter debug
      # keystore (see android/app/build.gradle) so CI has no secrets to
      # manage yet. Swap in a real release-signing config + secrets before
      # shipping to the Play Store.
      - name: Build release APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: baby-feed-tracker-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
